<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Web Player Clone</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.42 1.56-.301.421-1.021.599-1.561.3z"/></svg>
        Spotify
      </div>
      <ul class="nav-list">
        <li><a class="nav-item" data-page="index.html" href="index.html">
          <svg viewBox="0 0 24 24"><path d="M12.5.67s.74 2.65.74 4.8c0 2.06-1.35 3.73-3.41 3.73-2.07 0-3.63-1.67-3.63-3.73l.03-.36C3.94 7.5 2 10.71 2 14.5 2 19.19 5.8 23 10.5 23c4.42 0 8.5-3.53 8.5-9.5C19 8.5 12.5.67 12.5.67z"/></svg>
          Home
        </a></li>
        <li><a class="nav-item" data-page="search.html" href="search.html">
          <svg viewBox="0 0 24 24"><path d="M10.533 1.279c-5.18 0-9.407 4.14-9.407 9.279s4.226 9.279 9.407 9.279c2.234 0 4.29-.77 5.907-2.058l4.353 4.353a1 1 0 0 0 1.414-1.414l-4.344-4.344a9.157 9.157 0 0 0 2.077-5.816c0-5.14-4.226-9.28-9.407-9.28zm-7.407 9.279c0-4.006 3.302-7.279 7.407-7.279 4.105 0 7.407 3.273 7.407 7.279s-3.302 7.279-7.407 7.279c-4.105 0-7.407-3.273-7.407-7.279z"/></svg>
          Search
        </a></li>
      </ul>
    </div>

    <div class="sidebar-library">
      <div class="library-header">
        <div class="library-title" id="libraryToggle">
          <svg viewBox="0 0 24 24"><path d="M14.5 2.134a1 1 0 0 1 1 0l6 3.464a1 1 0 0 1 .5.866V21a1 1 0 0 1-1 1h-6a1 1 0 0 1-1-1V3a1 1 0 0 1 .5-.866zM16 4.732V20h4V7.041l-4-2.309zM3 22a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H3zm1-2h4V4H4v16z"/></svg>
          Your Library
        </div>
        <div style="display:flex; gap:4px;">
          <button class="icon-btn" title="Create playlist">
            <svg viewBox="0 0 16 16"><path d="M15.25 8a.75.75 0 0 1-.75.75H8.75v5.75a.75.75 0 0 1-1.5 0V8.75H1.5a.75.75 0 0 1 0-1.5h5.75V1.5a.75.75 0 0 1 1.5 0v5.75h5.75a.75.75 0 0 1 .75.75z"/></svg>
          </button>
        </div>
      </div>
      <div class="library-filters">
        <div class="chip active">Playlists</div>
        <div class="chip">Artists</div>
        <div class="chip">Albums</div>
      </div>
      <div class="library-search-row">
        <span>Recents</span>
      </div>
      <div class="library-list" id="libraryList"></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainPanel">
    <div class="topbar">
      <div class="nav-arrows">
        <button><svg viewBox="0 0 24 24"><path d="M15.957 2.793a1 1 0 0 0-1.414 0L6.086 11.25a1 1 0 0 0 0 1.414l8.457 8.457a1 1 0 0 0 1.414-1.414L8.207 12l7.75-7.793a1 1 0 0 0 0-1.414z"/></svg></button>
        <button><svg viewBox="0 0 24 24"><path d="M8.043 2.793a1 1 0 0 1 1.414 0l8.457 8.457a1 1 0 0 1 0 1.414l-8.457 8.457a1 1 0 0 1-1.414-1.414L15.793 12 8.043 4.207a1 1 0 0 1 0-1.414z"/></svg></button>
      </div>
      <div class="top-actions">
        <a class="btn-signup" href="#">Sign up</a>
        <a class="btn-login" href="#">Log in</a>
        <div class="avatar-btn">U</div>
      </div>
    </div>

    <div class="content">
      <h1 class="greeting" id="greeting">Good afternoon</h1>

      <div class="quick-grid" id="quickGrid"></div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Made for you</div>
          <div class="show-all">Show all</div>
        </div>
        <div class="card-row" id="madeForYou"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Popular albums</div>
          <div class="show-all">Show all</div>
        </div>
        <div class="card-row" id="popularAlbums"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <div class="section-title">Your top artists</div>
          <div class="show-all">Show all</div>
        </div>
        <div class="card-row" id="topArtists"></div>
      </div>
    </div>
  </div>

  <!-- NOW PLAYING BAR -->
  <div class="nowbar">
    <div class="np-left">
      <div class="np-art" id="npArt" style="background:#4a2e6b;">🎵</div>
      <div class="np-meta">
        <div class="np-title" id="npTitle">Midnight City Lights</div>
        <div class="np-artist" id="npArtist">The Wanderers</div>
      </div>
      <button class="like-btn" id="likeBtn" title="Save to Your Library">
        <svg viewBox="0 0 24 24"><path d="M12 21s-6.716-4.35-9.428-8.06C.36 9.99 1.09 6.2 4.11 4.6c2.34-1.24 5.09-.5 6.5 1.55.31.44.66.96 1.39 1.9.73-.94 1.08-1.46 1.39-1.9 1.41-2.05 4.16-2.79 6.5-1.55 3.02 1.6 3.75 5.39 1.54 8.34C18.716 16.65 12 21 12 21z"/></svg>
      </button>
    </div>

    <div class="np-center">
      <div class="np-controls">
        <button class="ctrl-btn" title="Shuffle">
          <svg viewBox="0 0 16 16"><path d="M13.151.922a.75.75 0 1 0-1.06 1.06L13.109 3H11.16a3.75 3.75 0 0 0-2.873 1.34l-6.173 7.356A2.25 2.25 0 0 1 .39 12.5H0V14h.391a3.75 3.75 0 0 0 2.873-1.34l6.173-7.356a2.25 2.25 0 0 1 1.724-.804h1.947l-1.017 1.018a.75.75 0 0 0 1.06 1.06L15.98 3.75 13.151.922zM.391 3.5H0V2h.391c1.109 0 2.16.49 2.873 1.34L4.89 5.277l-.979 1.167-1.796-2.14A2.25 2.25 0 0 0 .391 3.5z"/><path d="m7.5 10.723.98-1.167.957 1.14a2.25 2.25 0 0 0 1.724.804h1.947l-1.017-1.018a.75.75 0 1 1 1.06-1.06l2.829 2.828-2.829 2.828a.75.75 0 1 1-1.06-1.06L13.109 13H11.16a3.75 3.75 0 0 1-2.873-1.34l-.787-.938z"/></svg>
        </button>
        <button class="ctrl-btn" title="Previous">
          <svg viewBox="0 0 16 16"><path d="M3.3 1a.7.7 0 0 1 .7.7v5.15l9.95-5.744a.7.7 0 0 1 1.05.606v12.575a.7.7 0 0 1-1.05.607L4 9.149V14.3a.7.7 0 0 1-.7.7H1.7a.7.7 0 0 1-.7-.7V1.7a.7.7 0 0 1 .7-.7h1.6z"/></svg>
        </button>
        <button class="play-pause" id="playPauseBtn" title="Play">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M7.05 3.606c0-.995 1.083-1.609 1.933-1.101l11.54 6.394c.868.516.868 1.72 0 2.236L8.983 17.529c-.85.508-1.933-.106-1.933-1.101V3.606z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M5.7 3a.7.7 0 0 0-.7.7v16.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V3.7a.7.7 0 0 0-.7-.7H5.7zm10 0a.7.7 0 0 0-.7.7v16.6a.7.7 0 0 0 .7.7h2.6a.7.7 0 0 0 .7-.7V3.7a.7.7 0 0 0-.7-.7h-2.6z"/></svg>
        </button>
        <button class="ctrl-btn" title="Next">
          <svg viewBox="0 0 16 16"><path d="M12.7 1a.7.7 0 0 0-.7.7v5.15L2.05 1.107A.7.7 0 0 0 1 1.712v12.575a.7.7 0 0 0 1.05.607L12 9.149V14.3a.7.7 0 0 0 .7.7h1.6a.7.7 0 0 0 .7-.7V1.7a.7.7 0 0 0-.7-.7h-1.6z"/></svg>
        </button>
        <button class="ctrl-btn" title="Repeat">
          <svg viewBox="0 0 16 16"><path d="M0 4.75A3.75 3.75 0 0 1 3.75 1h8.5A3.75 3.75 0 0 1 16 4.75v5a3.75 3.75 0 0 1-3.75 3.75H9.81l1.018 1.018a.75.75 0 1 1-1.06 1.06L6.939 12.75l2.829-2.828a.75.75 0 1 1 1.06 1.06L9.81 12h2.44a2.25 2.25 0 0 0 2.25-2.25v-5a2.25 2.25 0 0 0-2.25-2.25h-8.5A2.25 2.25 0 0 0 1.5 4.75v5A2.25 2.25 0 0 0 3.75 12H5v1.5H3.75A3.75 3.75 0 0 1 0 9.75v-5z"/></svg>
        </button>
      </div>
      <div class="np-progress">
        <span class="time left" id="curTime">1:04</span>
        <div class="bar-track" id="seekTrack">
          <div class="bar-fill" id="seekFill"></div>
          <div class="bar-thumb" id="seekThumb"></div>
        </div>
        <span class="time right" id="totalTime">4:47</span>
      </div>
    </div>

    <div class="np-right">
      <button class="ctrl-btn" title="Now playing view">
        <svg viewBox="0 0 16 16"><path d="M4 2.5a1.5 1.5 0 0 1 1.5-1.5h5A1.5 1.5 0 0 1 12 2.5v11a1.5 1.5 0 0 1-1.5 1.5h-5A1.5 1.5 0 0 1 4 13.5v-11zM5.5 2a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5h5a.5.5 0 0 0 .5-.5v-11a.5.5 0 0 0-.5-.5h-5z"/></svg>
      </button>
      <button class="ctrl-btn" title="Queue">
        <svg viewBox="0 0 16 16"><path d="M15 15H1v-1.5h14V15zm0-4.5H1V9h14v1.5zm-14-7A2.5 2.5 0 0 1 3.5 1h9a2.5 2.5 0 0 1 0 5h-9A2.5 2.5 0 0 1 1 3.5zm2.5-1a1 1 0 0 0 0 2h9a1 1 0 1 0 0-2h-9z"/></svg>
      </button>
      <div class="volume-group">
        <button class="ctrl-btn" id="muteBtn" title="Mute">
          <svg viewBox="0 0 16 16"><path d="M9.741.85a.75.75 0 0 1 .375.65v13a.75.75 0 0 1-1.125.65l-6.925-4a3.642 3.642 0 0 1-1.33-4.967 3.639 3.639 0 0 1 1.33-1.332l6.925-4a.75.75 0 0 1 .75 0zm-6.924 5.3a2.139 2.139 0 0 0 0 3.7l5.8 3.35V2.8l-5.8 3.35zm8.683 1.85a2.75 2.75 0 0 0-1.235-2.298.75.75 0 1 1 .827-1.252A4.25 4.25 0 0 1 13 8a4.25 4.25 0 0 1-1.908 3.55.75.75 0 1 1-.827-1.252A2.75 2.75 0 0 0 11.5 8z"/></svg>
        </button>
        <div class="vol-track" id="volTrack">
          <div class="vol-fill" id="volFill"></div>
          <div class="vol-thumb" id="volThumb"></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="common.js"></script>
<script src="home.js"></script>
</body>
</html>
